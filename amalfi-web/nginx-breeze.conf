server {
    listen 80;
    server_name _;

    root /var/www/amalfi-web;
    index index.html;

    # SPA routing â€” all paths fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Amalfi Hub on CT 101 (backend-apis)
    location /api/ {
        proxy_pass http://192.168.1.101:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy uploaded receipts from CT 101
    location /uploads/ {
        proxy_pass http://192.168.1.101:3001/uploads/;
    }

    # Static asset caching
    location ~* \.(ico|css|js|gif|jpe?g|png|json|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/amalfi-access.log;
    error_log /var/log/nginx/amalfi-error.log;
}
